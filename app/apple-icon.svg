<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1221"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00BCD4" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4DD0E1"/>
      <stop offset="50%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
    <linearGradient id="border-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4DD0E1" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#00838F" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF7043" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7" result="blur"/>
      <feFlood flood-color="#00BCD4" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="180" height="180" rx="38" fill="url(#bg)"/>
  <rect width="180" height="180" rx="38" fill="url(#bg-glow)"/>
  <rect x="1" y="1" width="178" height="178" rx="37" fill="none" stroke="url(#border-g)" stroke-width="1"/>
  <text x="90" y="134" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="120" font-weight="800" fill="url(#sg)" text-anchor="middle" filter="url(#glow)">S</text>
  <circle cx="144" cy="144" r="9" fill="#FF7043" opacity="0.12"/>
  <circle cx="144" cy="144" r="5.5" fill="#FF7043" opacity="0.85"/>
</svg>
