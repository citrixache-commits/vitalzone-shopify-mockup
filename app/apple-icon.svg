<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DE0ED"/>
      <stop offset="35%" stop-color="#26C6DA"/>
      <stop offset="70%" stop-color="#00838F"/>
      <stop offset="100%" stop-color="#006978"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="topLight" cx="25%" cy="15%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottomDark" x1="0%" y1="55%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#003D4D" stop-opacity="0"/>
      <stop offset="100%" stop-color="#003D4D" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
    <filter id="sshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.8"/>
      <feOffset dy="1.8"/>
      <feFlood flood-color="#003D4D" flood-opacity="0.55"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="180" height="180" rx="38" fill="url(#bg)"/>
  <rect width="180" height="180" rx="38" fill="url(#bottomDark)"/>
  <rect width="180" height="180" rx="38" fill="url(#topLight)"/>
  <rect width="180" height="85" rx="38" fill="url(#gloss)"/>
  <rect x="2" y="2" width="176" height="176" rx="37" fill="none" stroke="white" stroke-width="0.8" stroke-opacity="0.35"/>

  <circle cx="90" cy="90" r="78" fill="none" stroke="white" stroke-width="0.6" stroke-opacity="0.25" stroke-dasharray="1 2.5"/>
  <circle cx="90" cy="90" r="72" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.5"/>

  <circle cx="90" cy="18" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="90" cy="162" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="18" cy="90" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="162" cy="90" r="2.5" fill="white" opacity="0.85"/>
  <circle cx="39" cy="39" r="1.8" fill="white" opacity="0.6"/>
  <circle cx="141" cy="39" r="1.8" fill="white" opacity="0.6"/>
  <circle cx="39" cy="141" r="1.8" fill="white" opacity="0.6"/>
  <circle cx="141" cy="141" r="1.8" fill="white" opacity="0.6"/>

  <circle cx="90" cy="90" r="65" fill="none" stroke="white" stroke-width="0.4" stroke-opacity="0.55"/>

  <!-- Laurel branches simplified for small size -->
  <g opacity="0.5" fill="white">
    <path d="M 25 90 Q 30 70 35 55 Q 39 43 41 33" fill="none" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <ellipse cx="29" cy="79" rx="4" ry="1.8" transform="rotate(-55 29 79)"/>
    <ellipse cx="32" cy="68" rx="4" ry="1.8" transform="rotate(-50 32 68)"/>
    <ellipse cx="34" cy="57" rx="4" ry="1.8" transform="rotate(-45 34 57)"/>
    <ellipse cx="37" cy="46" rx="4" ry="1.8" transform="rotate(-40 37 46)"/>
    <path d="M 25 90 Q 30 110 35 125 Q 39 137 41 147" fill="none" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <ellipse cx="29" cy="101" rx="4" ry="1.8" transform="rotate(55 29 101)"/>
    <ellipse cx="32" cy="112" rx="4" ry="1.8" transform="rotate(50 32 112)"/>
    <ellipse cx="34" cy="123" rx="4" ry="1.8" transform="rotate(45 34 123)"/>
    <ellipse cx="37" cy="134" rx="4" ry="1.8" transform="rotate(40 37 134)"/>
  </g>
  <g opacity="0.5" fill="white">
    <path d="M 155 90 Q 150 70 145 55 Q 141 43 139 33" fill="none" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <ellipse cx="151" cy="79" rx="4" ry="1.8" transform="rotate(55 151 79)"/>
    <ellipse cx="148" cy="68" rx="4" ry="1.8" transform="rotate(50 148 68)"/>
    <ellipse cx="146" cy="57" rx="4" ry="1.8" transform="rotate(45 146 57)"/>
    <ellipse cx="143" cy="46" rx="4" ry="1.8" transform="rotate(40 143 46)"/>
    <path d="M 155 90 Q 150 110 145 125 Q 141 137 139 147" fill="none" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <ellipse cx="151" cy="101" rx="4" ry="1.8" transform="rotate(-55 151 101)"/>
    <ellipse cx="148" cy="112" rx="4" ry="1.8" transform="rotate(-50 148 112)"/>
    <ellipse cx="146" cy="123" rx="4" ry="1.8" transform="rotate(-45 146 123)"/>
    <ellipse cx="143" cy="134" rx="4" ry="1.8" transform="rotate(-40 143 134)"/>
  </g>

  <circle cx="90" cy="45" r="1.3" fill="white" opacity="0.85"/>
  <circle cx="77" cy="48" r="1" fill="white" opacity="0.6"/>
  <circle cx="103" cy="48" r="1" fill="white" opacity="0.6"/>

  <text x="90" y="121" font-family="Georgia, 'Times New Roman', Times, serif" font-size="92" font-weight="700" fill="url(#sg)" text-anchor="middle" filter="url(#sshadow)">S</text>

  <path d="M 56 138 L 68 138 L 73 129 L 78 148 L 83 127 L 87 138 L 96 138 L 101 130 L 106 145 L 111 128 L 116 138 L 125 138" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <circle cx="146" cy="34" r="7" fill="#FF7043" opacity="0.15"/>
